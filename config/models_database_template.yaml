# Configuration des tâches et recommandations
task_recommendations:
  code_analysis:
    primary_models: ["claude-3-5-sonnet", "gpt-4o", "gemini-2.5-pro"]
    secondary_models: ["o1", "deepseek-r1", "mistral-large"]
    avoid_models: []

  code_generation:
    primary_models: ["gpt-4o", "claude-3-5-sonnet", "gemini-2.5-pro"]
    secondary_models: ["qwen-2.5-coder", "cerebras-llama-3.1"]
    avoid_models: []

  debugging:
    primary_models: ["o1", "claude-3-5-sonnet", "gpt-4o"]
    secondary_models: ["deepseek-r1", "mistral-large"]
    avoid_models: []

  planning:
    primary_models: ["claude-3-5-sonnet", "o1", "gpt-4o"]
    secondary_models: ["gemini-2.5-pro", "deepseek-r1"]
    avoid_models: ["gpt-4o-mini", "claude-3-haiku"]

  optimization:
    primary_models: ["o1", "claude-3-5-sonnet", "deepseek-r1"]
    secondary_models: ["gpt-4o", "mistral-large"]
    avoid_models: []

  documentation:
    primary_models: ["gpt-4o", "claude-3-5-sonnet", "gemini-2.5-pro"]
    secondary_models: ["mistral-large", "qwen-2.5-coder"]
    avoid_models: []

  testing:
    primary_models: ["gpt-4o", "claude-3-5-sonnet", "gemini-2.5-pro"]
    secondary_models: ["qwen-2.5-coder", "cerebras-llama-3.1"]
    avoid_models: []

# Métriques et monitoring
monitoring:
  enabled: true
  metrics:
    - response_time
    - token_usage
    - success_rate
    - cost_per_request
    - context_utilization

  alerts:
    high_cost_threshold: 0.01  # USD per request
    low_success_threshold: 0.8  # 80% success rate
    high_latency_threshold: 30000  # 30 seconds

# Version et métadonnées
version: "1.0.0"
last_updated: "2025-11-09"
maintainers: ["ECOS CLI Team"]
description: "Base de données centralisée des modèles LLM pour VS Code LM Proxy"
