# Configuration globale des providers
providers:
  anthropic:
    name: "Anthropic"
    website: "https://anthropic.com"
    api_docs: "https://docs.anthropic.com"
    models_endpoint: "https://api.anthropic.com/v1/messages"
    rate_limits:
      requests_per_minute: 50
      tokens_per_minute: 40000
    pricing_model: "input_output_tokens"

  openai:
    name: "OpenAI"
    website: "https://openai.com"
    api_docs: "https://platform.openai.com/docs"
    models_endpoint: "https://api.openai.com/v1/chat/completions"
    rate_limits:
      requests_per_minute: 10000
      tokens_per_minute: 2000000
    pricing_model: "input_output_tokens"

  google:
    name: "Google AI"
    website: "https://ai.google.dev"
    api_docs: "https://ai.google.dev/docs"
