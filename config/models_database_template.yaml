# VS Code LM Proxy - LLM Models Database Template
# Template pour gérer les modèles LLM supportés par différents outils
# Évite le hardcoding et permet une gestion centralisée

# Structure de base pour chaque outil
tools:
  # Cline - https://cline.bot/
  cline:
    name: "Cline"
    website: "https://cline.bot/"
    github: "https://github.com/cline/cline"
    description: "AI coding agent open source avec architecture client-side"
    supported_models:
      - id: "claude-3-5-sonnet"
        provider: "anthropic"
        family: "claude-3.5"
        context_window: 200000
        pricing: "anthropic_rates"
        capabilities: ["coding", "reasoning", "planning"]
        recommended_for: ["complex_tasks", "enterprise"]

      - id: "claude-3-haiku"
        provider: "anthropic"
        family: "claude-3"
        context_window: 200000
        pricing: "anthropic_rates"
        capabilities: ["coding", "fast_responses"]
        recommended_for: ["quick_tasks", "prototyping"]

      - id: "gpt-4o"
        provider: "openai"
        family: "gpt-4o"
        context_window: 128000
        pricing: "openai_rates"
        capabilities: ["coding", "reasoning", "multimodal"]
        recommended_for: ["balanced_performance"]

      - id: "gpt-4o-mini"
        provider: "openai"
        family: "gpt-4o"
        context_window: 128000
        pricing: "openai_rates"
        capabilities: ["coding", "fast_responses"]
        recommended_for: ["editor_interactions", "cost_efficient"]

      - id: "gemini-2.5-pro"
        provider: "google"
        family: "gemini-2.5"
        context_window: 1000000
        pricing: "google_rates"
        capabilities: ["coding", "large_context", "multimodal"]
        recommended_for: ["large_codebases", "complex_reasoning"]

      - id: "deepseek-r1"
        provider: "deepseek"
        family: "deepseek-r1"
        context_window: 128000
        pricing: "deepseek_rates"
        capabilities: ["coding", "reasoning", "cost_efficient"]
        recommended_for: ["budget_conscious", "reasoning_tasks"]

      - id: "grok-beta"
        provider: "xai"
        family: "grok"
        context_window: 128000
        pricing: "xai_rates"
        capabilities: ["coding", "humor", "reasoning"]
        recommended_for: ["creative_coding", "fun_interactions"]

      - id: "mistral-large"
        provider: "mistral"
        family: "mistral-large"
        context_window: 128000
        pricing: "mistral_rates"
        capabilities: ["coding", "multilingual", "reasoning"]
